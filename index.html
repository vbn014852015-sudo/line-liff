<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動進銷存系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-scan { background-color: #00b050; color: white; }
        .btn-submit { background-color: #00b050; color: white; }
        .input-group { margin: 15px 0; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        #reader { width: 100%; margin: auto; background: #000; border-radius: 5px; }
        #loadingStatus { margin-top: 15px; color: #666; font-weight: bold; }
        .success-text { color: #00b050; font-weight: bold; font-size: 18px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 條碼進銷存系統</h2>
    <p style="color: #666; font-size: 14px;">請將商品條碼對準相機進行掃描</p>
    
    <button class="btn-scan" id="scanBtn" onclick="startScan()">📷 開啟相機掃描條碼</button>
    <div id="reader" style="display:none;"></div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <div id="resultArea" style="display:none; text-align: left;">
        <h3 id="barcodeDisplay" style="color: #00b050; border-bottom: 2px solid #00b050; padding-bottom: 8px;">條碼: </h3>
        
        <div id="pName" class="input-group"></div>
        <div id="pCost" class="input-group"></div>
        <div id="pPrice" class="input-group"></div>
        <div id="pStock" style="margin: 12px 0; font-weight: bold; color: #333;"></div>
        <div id="pReserved" style="margin: 12px 0; color: #666;"></div>
        <div id="pAvailable" style="margin: 12px 0; color: #00b050; font-weight: bold;"></div>
        
        <div id="btnArea"></div>
    </div>

    <div id="loadingStatus"></div>
</div>

<script>
// 🌟 這裡最重要！請把你剛剛在 Google 管理部署複製的最新網址貼在下面這行 🌟
const GAS_URL = "請把這段中文字換成你剛剛複製的最新網址";
let currentBarcode = "";
let html5QrcodeScanner = null;

function startScan() {
    document.getElementById('reader').style.display = 'block';
    document.getElementById('loadingStatus').style.color = '#666';
    document.getElementById('loadingStatus').innerText = '🎥 相機啟動中...';
    document.getElementById('resultArea').style.display = 'none';

    html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 10, 
        qrbox: { width: 280, height: 160 },
        rememberLastUsedCamera: true
    });
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
}

function onScanFailure(error) {}

function onScanSuccess(decodedText) {
    currentBarcode = decodedText.trim();
    
    if (html5QrcodeScanner) {
        html5QrcodeScanner.clear().catch(err => console.error(err));
        document.getElementById('reader').style.display = 'none';
    }
    
    document.getElementById('loadingStatus').style.color = '#666';
    document.getElementById('loadingStatus').innerText = `🔍 條碼 [${currentBarcode}] 查詢中...`;
    
    fetch(`${GAS_URL}?action=search&barcode=${encodeURIComponent(currentBarcode)}`)
        .then(res => {
            if (!res.ok) throw new Error('網路回應不正確');
            return res.json();
        })
        .then(data => {
            document.getElementById('loadingStatus').innerText = '';
            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'block';
            document.getElementById('barcodeDisplay').innerText = `🔍 條碼: ${currentBarcode}`;

            if (data.isNew) {
                // 全新商品建檔表單
                document.getElementById('pName').innerHTML = `<label>品名：</label><input type='text' id='editName' placeholder='請輸入全新商品名稱'>`;
                document.getElementById('pCost').innerHTML = `<label>成本：$</label><input type='number' id='editCost' value='0' min='0'>`;
                document.getElementById('pPrice').innerHTML = `<label>售價：$</label><input type='number' id='editPrice' value='0' min='0'>`;
                document.getElementById('pStock').innerText = `總庫存：0 (全新建檔)`;
                document.getElementById('pReserved').innerText = ``;
                document.getElementById('pAvailable').innerText = ``;
                
                document.getElementById('btnArea').innerHTML = `<button class="btn-submit" onclick="saveNewProduct()">💾 確認建立新檔案並入庫</button>`;
            } else {
                // 已存在商品展示
                document.getElementById('pName').innerHTML = `<b>品名：</b> ${data.name}`;
                document.getElementById('pPrice').innerHTML = `<b>售價：</b> $${data.price}`;
                document.getElementById('pCost').innerHTML = `<b>成本：</b> $${data.cost}`;
                document.getElementById('pStock').innerText = `總庫存：${data.stock}`;
                document.getElementById('pReserved').innerText = `預留數量：${data.reserved}`;
                document.getElementById('pAvailable').innerText = `可用庫存：${data.available}`;
                document.getElementById('btnArea').innerHTML = `<div class="success-text">✅ 此商品已記錄在商品總表中</div>`;
            }
        })
        .catch(err => {
            console.error(err);
            document.getElementById('loadingStatus').style.color = '#ff3333';
            document.getElementById('loadingStatus').innerText = '❌ 連線失敗。請確認你的 GAS 最新網址已正確填入 GitHub，且已發布為所有人存取。';
        });
}

function saveNewProduct() {
    const nameEl = document.getElementById('editName');
    const costEl = document.getElementById('editCost');
    const priceEl = document.getElementById('editPrice');

    if (!nameEl || !nameEl.value.trim()) {
        alert('請輸入商品名稱！');
        return;
    }

    const name = nameEl.value.trim();
    const cost = costEl ? costEl.value : 0;
    const price = priceEl ? priceEl.value : 0;
    const initStock = 1; 

    document.getElementById('loadingStatus').style.color = '#666';
    document.getElementById('loadingStatus').innerText = '⏳ 新商品自動建檔中，請稍候...';

    const targetUrl = `${GAS_URL}?action=add&barcode=${encodeURIComponent(currentBarcode)}&name=${encodeURIComponent(name)}&price=${price}&cost=${cost}&initStock=${initStock}`;

    fetch(targetUrl)
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert(data.msg); 
                location.reload(); 
            } else {
                alert('建檔失敗原因：' + data.msg);
                document.getElementById('loadingStatus').innerText = '';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('系統傳送失敗，請重新嘗試。');
            document.getElementById('loadingStatus').innerText = '';
        });
}
</script>
</body>
</html>
