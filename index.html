<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動進銷存系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-scan { background-color: #00b050; color: white; }
        .btn-submit { background-color: #00b050; color: white; }
        .btn-blue { background-color: #007bff; color: white; }
        .input-group { margin: 15px 0; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        #reader { width: 100%; margin: auto; background: #000; border-radius: 5px; }
        .success-text { color: #00b050; font-weight: bold; font-size: 18px; margin: 10px 0; }
        .mode-box { margin-top: 15px; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 5px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 條碼進銷存系統</h2>
    <p style="color: #666; font-size: 14px;">請將商品條碼對準相機進行掃描</p>
    
    <button class="btn-scan" id="scanBtn" onclick="startScan()">📷 開啟相機掃描條碼</button>
    <div id="reader" style="display:none;"></div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <div id="resultArea" style="display:none; text-align: left;">
        <h3 id="barcodeDisplay" style="color: #00b050; border-bottom: 2px solid #00b050; padding-bottom: 8px;">條碼: </h3>
        
        <div class="mode-box">
            <h4>🔍 動作 A：查詢此商品資訊</h4>
            <p style="font-size: 13px; color: #666; margin-top: -8px;">若商品已存在，點此按鈕可直接至 Google 雲端庫存畫面查閱。</p>
            <form id="searchForm" method="GET" action="" target="_blank">
                <input type="hidden" name="action" value="search">
                <input type="hidden" name="barcode" id="searchBarcode">
                <button class="btn-blue" type="submit">📡 跳轉至雲端查詢商品</button>
            </form>
        </div>

        <div class="mode-box" style="margin-top: 20px;">
            <h4>💾 動作 B：全新商品建檔 / 快速入庫</h4>
            <p style="font-size: 13px; color: #666; margin-top: -8px;">若是第一次看到的全新商品，請填寫下方欄位後直接點擊送出建檔。</p>
            
            <form id="productForm" method="POST" action="">
                <input type="hidden" name="action" value="add">
                <input type="hidden" name="barcode" id="formBarcode">
                <input type="hidden" name="initStock" value="1">

                <div class="input-group">
                    <label>品名：</label>
                    <input type="text" name="name" id="editName" placeholder="請輸入全新商品名稱" required>
                </div>
                <div class="input-group">
                    <label>成本：$</label>
                    <input type="number" name="cost" id="editCost" value="0" min="0">
                </div>
                <div class="input-group">
                    <label>售價：$</label>
                    <input type="number" name="price" id="editPrice" value="0" min="0">
                </div>
                
                <button class="btn-submit" type="button" onclick="submitProductForm()">💾 確認建立新檔案並入庫</button>
            </form>
        </div>
    </div>

    <div id="loadingStatus" style="margin-top: 15px; font-weight: bold; color: #666;">🟢 系統就緒，等待操作...</div>
</div>

<script>
// 🌟 請在此處更換填入你部署後複製取得的最新 GAS 網址 🌟
const GAS_URL = "https://script.google.com/macros/s/AKfycbwT6593UFvtpDSMFxACCdtsx2zer2sTtC6KdoRUljOT54SA_HO_TCLoqELQNNP8imx0w/exec";

// 初始化將兩個原生表單的傳送目標設定為你的 GAS 後台
document.getElementById('searchForm').action = GAS_URL;
document.getElementById('productForm').action = GAS_URL;

let currentBarcode = "";
let html5QrcodeScanner = null;

function startScan() {
    document.getElementById('reader').style.display = 'block';
    document.getElementById('loadingStatus').style.color = '#666';
    document.getElementById('loadingStatus').innerText = '🎥 相機啟動中...';
    document.getElementById('resultArea').style.display = 'none';

    html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 10, 
        qrbox: { width: 280, height: 160 },
        rememberLastUsedCamera: true
    });
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
}

function onScanFailure(error) {}

function onScanSuccess(decodedText) {
    currentBarcode = decodedText.trim();
    
    if (html5QrcodeScanner) {
        html5QrcodeScanner.clear().catch(err => console.error(err));
        document.getElementById('reader').style.display = 'none';
    }
    
    // 💡 核心改動：直接跳過 fetch 查詢，將識別到的條碼直接填入兩個原生表單的隱藏欄位中
    document.getElementById('searchBarcode').value = currentBarcode;
    document.getElementById('formBarcode').value = currentBarcode;
    
    // 更新介面 UI 顯示
    document.getElementById('barcodeDisplay').innerText = `🔍 條碼: ${currentBarcode}`;
    document.getElementById('loadingStatus').innerText = '';
    document.getElementById('resultArea').style.display = 'block';
}

function submitProductForm() {
    const nameInput = document.getElementById('editName');
    if (!nameInput || !nameInput.value.trim()) {
        alert('請填寫商品名稱！');
        return;
    }
    
    document.getElementById('loadingStatus').style.color = '#333';
    document.getElementById('loadingStatus').innerText = '⏳ 正在跳轉至 Google 伺服器寫入資料庫...';
    
    // 🚀 利用 HTML5 原生表單提交，徹底繞過所有網域與安全性限制封鎖！
    document.getElementById('productForm').submit();
}
</script>
</body>
</html>
