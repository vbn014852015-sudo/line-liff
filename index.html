<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動進銷存系統 (除錯版)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-scan { background-color: #00b050; color: white; }
        #debugLog { margin-top: 15px; padding: 10px; background: #fff3f3; color: #ff3333; border: 1px dashed #ff9999; border-radius: 5px; text-align: left; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 條碼進銷存系統 (Debug Mode)</h2>
    <p style="color: #666; font-size: 14px;">此版本已啟動錯誤回報追蹤</p>
    
    <button class="btn-scan" onclick="startScan()">📷 開啟相機儲存條碼</button>
    <div id="reader" style="display:none;"></div>

    <div id="debugLog">🟢 系統初始化中，等待操作...</div>
</div>

<script>
// 🔍 請幫我肉眼檢查這裡的 GAS_URL 網址前後有沒有不小心多複製到空格
const GAS_URL = "https://script.google.com/macros/s/AKfycbwT6593UFvtpDSMFxACCdtsx2zer2sTtC6KdoRUljOT54SA_HO_TCLoqELQNNP8imx0w/exec";
let currentBarcode = "";

// 🚀 全域錯誤攔截器：只要網頁有任何地方寫錯或報錯，立刻抓出來印在畫面上！
window.onerror = function(message, source, lineno, colno, error) {
    const logBox = document.getElementById('debugLog');
    logBox.style.background = '#fff3f3';
    logBox.style.color = '#ff3333';
    logBox.innerHTML = `🚨 <b>網頁程式碼發生錯誤！</b><br>` +
                       `❌ 錯誤訊息: ${message}<br>` +
                       `📍 錯誤行號: 第 ${lineno} 行<br>` +
                       `🔗 錯誤來源: ${source}`;
    return false;
};

function startScan() {
    document.getElementById('debugLog').innerHTML = "⏳ 正在啟動鏡頭...";
    try {
        document.getElementById('reader').style.display = 'block';
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 150 } });
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    } catch(err) {
        document.getElementById('debugLog').innerHTML = `🚨 相機初始化失敗: ${err.message}`;
    }
}

function onScanFailure(error) {
    // 忽略常態對焦失敗
}

function onScanSuccess(decodedText) {
    currentBarcode = decodedText.trim();
    document.getElementById('reader').style.display = 'none';
    document.getElementById('debugLog').style.color = '#333';
    document.getElementById('debugLog').style.background = '#f0f9f0';
    document.getElementById('debugLog').innerHTML = `⏳ 成功辨識條碼: <b>${currentBarcode}</b><br>📡 正在向 Google GAS 發送聯絡請求...`;
    
    const requestUrl = `${GAS_URL}?action=search&barcode=${encodeURIComponent(currentBarcode)}`;
    
    fetch(requestUrl)
        .then(res => {
            document.getElementById('debugLog').innerHTML += `<br>✅ 收到 Google 伺服器初步回應！狀態碼: ${res.status}`;
            return res.json();
        })
        .then(data => {
            document.getElementById('debugLog').innerHTML += `<br>🎉 解析 JSON 資料成功！資料庫回應：${JSON.stringify(data)}`;
        })
        .catch(err => {
            document.getElementById('debugLog').style.background = '#fff3f3';
            document.getElementById('debugLog').style.color = '#ff3333';
            document.getElementById('debugLog').innerHTML += `<br>🚨 <b>Fetch 請求失敗！內部細節：</b><br>` +
                                                             `• 錯誤名稱: ${err.name}<br>` +
                                                             `• 錯誤原因: ${err.message}<br>` +
                                                             `• 目標網址: <a href="${requestUrl}" target="_blank">點此手動測試 GAS 網址是否活著</a>`;
        });
}
</script>
</body>
</html>
